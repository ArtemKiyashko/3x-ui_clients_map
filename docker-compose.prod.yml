version: '3.8'

services:
  map-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: 3x-ui-map-service-prod
    environment:
      - X3UI_URL=${X3UI_URL}
      - X3UI_PANEL_PATH=${X3UI_PANEL_PATH:-/panel}
      - X3UI_API_KEY=${X3UI_API_KEY}
      - PORT=3000
      - NODE_ENV=production
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - map-network
    # Expose only to nginx (not to host)
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    container_name: 3x-ui-map-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Uncomment for SSL certificates
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - map-service
    restart: always
    networks:
      - map-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  map-network:
    driver: bridge
