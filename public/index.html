<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3x-ui Live Connections Map</title>
    
    <!-- MapLibre GL -->
    <link href='https://unpkg.com/maplibre-gl@4.0.0/dist/maplibre-gl.css' rel='stylesheet' />
    <script src='https://unpkg.com/maplibre-gl@4.0.0/dist/maplibre-gl.js'></script>
    
    <!-- Supercluster for clustering -->
    <script src='https://unpkg.com/supercluster@8/dist/supercluster.min.js'></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #000;
            color: #e5e7eb;
            overflow: hidden;
        }

        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
        }

        /* Marker styles */
        .marker-cluster {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(21, 27, 38, 0.94);
            color: #d1d5db;
            font-weight: 700;
            font-size: 13px;
            border: 1px solid rgba(148, 163, 184, 0.45);
            border-radius: 50%;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.45);
            cursor: pointer;
            transition: box-shadow 0.15s ease, border-color 0.15s ease;
        }

        .marker-cluster:hover {
            border-color: rgba(96, 165, 250, 0.75);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.55);
        }

        /* MapLibre popup overrides */
        .maplibregl-popup-content {
            background: #0f1117 !important;
            border: 1px solid rgba(74, 222, 128, 0.3) !important;
            border-radius: 0 !important;
            padding: 14px 24px 14px 14px !important;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6) !important;
            color: #e5e7eb !important;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif !important;
            min-width: 180px;
        }
        .maplibregl-popup-tip {
            border-top-color: #0f1117 !important;
            border-bottom-color: #0f1117 !important;
        }
        .maplibregl-popup-close-button {
            color: #6b7280 !important;
            font-size: 18px !important;
            line-height: 1 !important;
            right: 2px !important;
            top: 2px !important;
            width: 20px !important;
            height: 20px !important;
            padding: 0 !important;
            border-radius: 0 !important;
        }
        .maplibregl-popup-close-button:focus,
        .maplibregl-popup-close-button:focus-visible {
            outline: none !important;
            box-shadow: none !important;
        }
        .maplibregl-popup-close-button:hover {
            color: #e5e7eb !important;
            background: transparent !important;
        }

        .popup-title {
            font-weight: 700;
            margin-bottom: 10px;
            color: #4ade80;
            font-size: 14px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(74, 222, 128, 0.15);
        }

        .popup-label {
            font-size: 11px;
            font-weight: 600;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .popup-row {
            margin: 7px 0;
        }

        .popup-value {
            color: #e5e7eb;
            word-break: break-all;
            font-size: 13px;
            margin-top: 2px;
            font-weight: 500;
        }

        /* Scrollbar styling */
        .sidebar::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 3px;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: rgba(74, 222, 128, 0.3);
            border-radius: 3px;
        }

        .sidebar::-webkit-scrollbar-thumb:hover {
            background: rgba(74, 222, 128, 0.5);
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        // Конфиг
        const API_URL = '/api/connections';
        const UPDATE_INTERVAL = 10000; // 10 сек
        const COUNTRY_FLAGS = {
            'RU': '🇷🇺', 'US': '🇺🇸', 'DE': '🇩🇪', 'PL': '🇵🇱', 'FR': '🇫🇷',
            'GB': '🇬🇧', 'JP': '🇯🇵', 'CN': '🇨🇳', 'IN': '🇮🇳', 'BR': '🇧🇷',
            'UA': '🇺🇦', 'NL': '🇳🇱', 'IT': '🇮🇹', 'ES': '🇪🇸', 'CA': '🇨🇦',
            'SE': '🇸🇪', 'FI': '🇫🇮', 'TR': '🇹🇷', 'AU': '🇦🇺', 'MX': '🇲🇽'
        };

        let map;
        let markers = [];
        let cluster = new Supercluster({ radius: 56, maxZoom: 14 });
        let currentConnections = [];
        let openPopupKeys = new Set();
        let isRerendering = false;
        let hasUserInteractedWithMap = false;
        let hasAppliedDataAutofit = false;

        function applyFallbackViewport() {
            if (!map) return;

            map.easeTo({
                center: [95, 61],
                zoom: 2.4,
                duration: 0
            });
        }

        function fitToConnections(connections) {
            if (!map || !Array.isArray(connections) || !connections.length) return;

            const valid = connections.filter(
                (c) => Number.isFinite(c?.lat) && Number.isFinite(c?.lon)
            );
            if (!valid.length) return;

            if (valid.length === 1) {
                map.easeTo({
                    center: [valid[0].lon, valid[0].lat],
                    zoom: 5.2,
                    duration: 0
                });
                hasAppliedDataAutofit = true;
                return;
            }

            const bounds = new maplibregl.LngLatBounds(
                [valid[0].lon, valid[0].lat],
                [valid[0].lon, valid[0].lat]
            );

            for (let i = 1; i < valid.length; i++) {
                bounds.extend([valid[i].lon, valid[i].lat]);
            }

            const container = map.getContainer();
            const minSide = Math.max(240, Math.min(container.clientWidth || 0, container.clientHeight || 0));
            const pad = Math.max(12, Math.round(minSide * 0.07));

            map.fitBounds(bounds, {
                padding: { top: pad, bottom: pad, left: pad, right: pad },
                maxZoom: 5.8,
                duration: 0
            });
            hasAppliedDataAutofit = true;
        }

        function markUserInteraction(event) {
            if (event && event.originalEvent) {
                hasUserInteractedWithMap = true;
            }
        }

        function isIOSLikeDevice() {
            const ua = navigator.userAgent || '';
            const platform = navigator.platform || '';
            const maxTouchPoints = navigator.maxTouchPoints || 0;

            if (/iPad|iPhone|iPod/.test(ua)) return true;

            // iPadOS can present itself as MacIntel in browsers.
            return platform === 'MacIntel' && maxTouchPoints > 1;
        }

        /**
         * Инициализация MapLibre
         */
        function initMap() {
            map = new maplibregl.Map({
                container: 'map',
                style: '/style.json',
                center: [95, 61],
                zoom: 2.7,
                pitch: 0,
                bearing: 0,
                attributionControl: false
            });

            map.addControl(
                new maplibregl.AttributionControl({ compact: true }),
                'top-right'
            );

            if (!isIOSLikeDevice()) {
                map.addControl(
                    new maplibregl.FullscreenControl(),
                    'top-right'
                );
            }

            map.on('dragstart', markUserInteraction);
            map.on('zoomstart', markUserInteraction);
            map.on('rotatestart', markUserInteraction);
            map.on('pitchstart', markUserInteraction);

            map.on('load', () => {
                map.resize();
                fetchConnections();
                setInterval(fetchConnections, UPDATE_INTERVAL);
            });

            map.on('zoomend', () => {
                if (currentConnections.length) updateMarkers(currentConnections);
            });
        }

        /**
         * Создать SVG маркер
         */
        function createDotMarker(color) {
            const wrapper = document.createElement('div');
            wrapper.style.cssText = 'width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;';

            const dot = document.createElement('div');
            dot.style.cssText = [
                'width:21px', 'height:21px', 'border-radius:50%',
                'background:rgba(21,27,38,0.96)',
                'border:1.8px solid rgba(148,163,184,0.6)',
                'box-shadow:0 2px 8px rgba(0,0,0,0.55)',
                'display:flex', 'align-items:center', 'justify-content:center',
                'transition:transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease'
            ].join(';');

            const core = document.createElement('div');
            core.style.cssText = [
                'width:7px', 'height:7px', 'border-radius:50%',
                `background:${color}`,
                `box-shadow:0 0 5px ${color}99`
            ].join(';');

            dot.appendChild(core);

            wrapper.appendChild(dot);

            wrapper.onmouseenter = () => {
                dot.style.transform = 'scale(1.14)';
                dot.style.borderColor = 'rgba(96,165,250,0.8)';
                dot.style.boxShadow = '0 3px 10px rgba(0,0,0,0.6)';
            };
            wrapper.onmouseleave = () => {
                dot.style.transform = 'scale(1)';
                dot.style.borderColor = 'rgba(148,163,184,0.55)';
                dot.style.boxShadow = '0 2px 8px rgba(0,0,0,0.55)';
            };

            return wrapper;
        }

        function getConnectionKey(props) {
            return `${props.clientName || 'unknown'}|${props.ip || 'unknown'}`;
        }

        function withCoordinateJitter(connections) {
            const grouped = new Map();

            connections.forEach((c) => {
                const key = `${c.lat},${c.lon}`;
                if (!grouped.has(key)) {
                    grouped.set(key, []);
                }
                grouped.get(key).push(c);
            });

            const result = [];

            grouped.forEach((items) => {
                if (items.length === 1) {
                    const c = items[0];
                    result.push({ ...c, renderLat: c.lat, renderLon: c.lon });
                    return;
                }

                const radius = 0.00035 + Math.min(items.length, 8) * 0.00003;
                items.forEach((c, i) => {
                    const angle = (2 * Math.PI * i) / items.length;
                    const latOffset = Math.sin(angle) * radius;
                    const lonScale = Math.max(Math.cos((c.lat * Math.PI) / 180), 0.2);
                    const lonOffset = (Math.cos(angle) * radius) / lonScale;

                    result.push({
                        ...c,
                        renderLat: c.lat + latOffset,
                        renderLon: c.lon + lonOffset
                    });
                });
            });

            return result;
        }

        /**
         * Получить цвет по стране
         */
        function getCountryColor(countryCode) {
            const colors = {
                'RU': '#ff6b6b', 'US': '#4d8dff', 'DE': '#26d07c', 'PL': '#ffa722',
                'FR': '#a855f7', 'GB': '#ec4899', 'JP': '#06b6d4', 'CN': '#ff6b9d',
                'UA': '#7c3aed', 'NL': '#1dd1a1', 'IT': '#ff9500', 'ES': '#6366f1',
                'SE': '#00d4ff', 'BR': '#22c55e', 'IN': '#f59e0b', 'AU': '#00bfa5'
            };
            return colors[countryCode] || '#8b7b8d';
        }

        /**
         * Обновить маркеры на карте
         */
        function updateMarkers(connections) {
            isRerendering = true;
            const nextOpenPopupKeys = new Set();
            markers.forEach((marker) => {
                const popup = marker.getPopup?.();
                if (popup && popup.isOpen?.() && marker.__popupKey) {
                    nextOpenPopupKeys.add(marker.__popupKey);
                }
            });
            openPopupKeys = nextOpenPopupKeys;

            // Очищаем старые маркеры
            markers.forEach(m => m.remove());
            markers = [];

            // Подготавливаем данные для кластеризации
            const renderConnections = withCoordinateJitter(connections);

            const points = renderConnections.map(c => ({
                type: 'Feature',
                geometry: {
                    type: 'Point',
                    coordinates: [c.renderLon, c.renderLat]
                },
                properties: {
                    ip: c.ip,
                    clientName: c.clientName,
                    country: c.country,
                    countryCode: c.countryCode,
                    city: c.city,
                    asn: c.asn
                }
            }));

            cluster.load(points);

            // Получаем кластеры для текущего зума
            const zoom = map.getZoom();
            const clusters = cluster.getClusters([-180, -90, 180, 90], Math.ceil(zoom));

            clusters.forEach(feature => {
                const coords = feature.geometry.coordinates;
                const props = feature.properties;

                if (props.cluster) {
                    // Это кластер
                    const size = props.point_count;
                    const clSize = 28 + Math.sqrt(size) * 2;
                    
                    const el = document.createElement('div');
                    el.className = 'marker marker-cluster';
                    el.textContent = size;
                    el.style.width = clSize + 'px';
                    el.style.height = clSize + 'px';
                    el.style.lineHeight = clSize + 'px';
                    
                    const marker = new maplibregl.Marker({
                        element: el,
                        anchor: 'center'
                    })
                        .setLngLat(coords)
                        .addTo(map);
                    
                    markers.push(marker);
                } else {
                    // Это отдельная точка
                    const color = getCountryColor(props.countryCode);
                    const popupKey = getConnectionKey(props);
                    
                    const markerEl = createDotMarker(color);
                    
                    const popup = new maplibregl.Popup({ offset: [0, -30], maxWidth: '220px', focusAfterOpen: false })
                        .setHTML(`
                            <div class="popup-title">${props.country} ${COUNTRY_FLAGS[props.countryCode] || ''}</div>
                            <div class="popup-row">
                                <div class="popup-label">Client</div>
                                <div class="popup-value">${props.clientName || '—'}</div>
                            </div>
                            <div class="popup-row">
                                <div class="popup-label">City</div>
                                <div class="popup-value">${props.city || '—'}</div>
                            </div>
                            <div class="popup-row">
                                <div class="popup-label">IP</div>
                                <div class="popup-value">${props.ip}</div>
                            </div>
                        `);
                    
                    const marker = new maplibregl.Marker({
                        element: markerEl,
                        anchor: 'center'
                    })
                        .setLngLat(coords)
                        .setPopup(popup)
                        .addTo(map);

                    marker.__popupKey = popupKey;

                    popup.on('open', () => openPopupKeys.add(popupKey));
                    popup.on('close', () => {
                        if (!isRerendering) {
                            openPopupKeys.delete(popupKey);
                        }
                    });

                    if (openPopupKeys.has(popupKey)) {
                        popup.setLngLat(coords).addTo(map);
                    }
                    
                    markers.push(marker);
                }
            });
            isRerendering = false;
        }

        /**
         * Загрузить данные
         */
        async function fetchConnections() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                currentConnections = Array.isArray(data.connections) ? data.connections : [];
                if (!hasUserInteractedWithMap && currentConnections.length) {
                    fitToConnections(currentConnections);
                }
                if (!currentConnections.length && !hasAppliedDataAutofit) {
                    applyFallbackViewport();
                }
                updateMarkers(currentConnections);
            } catch (error) {
                console.error('❌ Failed to fetch connections:', error);
            }
        }

        /**
         * Инициализация
         */
        document.addEventListener('DOMContentLoaded', () => {
            initMap();
        });
    </script>
</body>
</html>
